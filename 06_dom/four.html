<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 4</title>
</head>
<body style  ="background-color: black; color: #fff;">
    <ul class="language">
        <li> JavaScript </li>
    </ul>
</body>
<script>
    function addLanguage(LangName){
        const li = document.createElement("li")
        li.innerHTML = `${LangName}`
        document.querySelector(".language").
        appendChild(li)
    }
    addLanguage("python")
    addLanguage("typescript")

    function addOptiLanguage (LangName){
        const li = document.createElement("li")
        li.appendChild(document.createTextNode(LangName))
        document.querySelector(".language").appendChild(li)
    
    }
     addOptiLanguage("golang")

     //EDIT
     
     const secondLanguage = document.querySelector("li:nth-child(2)")
    // secondLanguage.innerHTML = "Mojo"
    const newli = document.createElement("li")
    newli.textContent = "MOJO"

    secondLanguage.replaceWith(newli)

    //edit
    const firstLanguage = document.querySelector("li:nth-child(1)") 
    firstLanguage.outerHTML = "TypeScript"

    //remove
    const lastlang = document.querySelector('li:last-child')   
    lastlang.remove()


</script>
</html>
